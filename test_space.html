<!DOCTYPE html>
<html>
<head>
<style>
  .main-bg {
    position: relative;
    width: 500px;
    height: 300px;
    border: 1px solid red;
    background: white;
  }
  .dot-grid-overlay {
    position: absolute;
    top: 15.5px; left: 15.5px; right: 15.5px; bottom: 15.5px;
    background-image: radial-gradient(circle at center, rgba(0,0,0,1) 1px, transparent 1.5px);
    background-size: 30px 30px;
    background-repeat: space;
    /* Add a border to see the overlay bounds */
    border: 1px solid rgba(0,0,255,0.2);
  }
  .cross {
    position: absolute;
    width: 13px; height: 13px;
    background: rgba(0, 255, 0, 0.5);
  }
  .tl { top: 24px; left: 24px; }
  .tr { top: 24px; right: 24px; }
</style>
</head>
<body>
  <div class="main-bg">
    <div class="cross tl"></div>
    <div class="cross tr"></div>
    <div class="dot-grid-overlay"></div>
  </div>
</body>
</html>
